<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="redGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8352B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E17;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D42E25;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C15;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Outer red ring - left arc -->
  <path d="M 100 15 A 85 85 0 0 0 100 185" fill="url(#redGrad1)" />
  
  <!-- Outer red ring - right arc -->
  <path d="M 100 15 A 85 85 0 0 1 100 185" fill="url(#redGrad2)" />
  
  <!-- Gap at top -->
  <rect x="94" y="10" width="12" height="30" fill="white" rx="2" />
  
  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="60" fill="url(#innerGlow)" />
  
  <!-- Letter "i" body (navy blue) -->
  <path d="M 88 85 L 88 155 Q 88 160 93 160 L 107 160 Q 112 160 112 155 L 112 85 Q 112 80 107 80 L 93 80 Q 88 80 88 85 Z" fill="#1B3A5C" />
  
  <!-- Serif on the "i" -->
  <rect x="82" y="148" width="36" height="8" rx="2" fill="#1B3A5C" />
  
  <!-- Pen nib (dark gray/charcoal) -->
  <path d="M 92 78 L 100 55 L 108 78 Z" fill="#3A3A3A" />
  
  <!-- Pen nib slot -->
  <line x1="100" y1="60" x2="100" y2="72" stroke="white" stroke-width="2" />
  
  <!-- Pen nib hole -->
  <circle cx="100" cy="58" r="2.5" fill="white" />
  
  <!-- Pen nib collar (orange/golden) -->
  <rect x="93" y="74" width="14" height="6" rx="1" fill="#E8912B" />
  
  <!-- Pen tip -->
  <path d="M 98 55 L 100 46 L 102 55 Z" fill="#3A3A3A" />
</svg>
